<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Matappen{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .navbar { background: #2e7d32 !important; }
        .navbar-brand, .nav-link { color: #fff !important; }
        .card-offer { border-left: 4px solid #ff6f00; }
        .badge-offer { background: #ff6f00; }
        .price { font-size: 1.3rem; font-weight: bold; color: #2e7d32; }
        .price-original { text-decoration: line-through; color: #999; font-size: 0.9rem; }
        .product-img { width: 80px; height: 80px; object-fit: contain; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛒 Matappen</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Hem</a>
            <a class="nav-link" href="/sok">Sök produkter</a>
            <a class="nav-link" href="/recept">Recept</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
